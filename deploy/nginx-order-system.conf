# 独立站点版 Nginx 配置示例（适合已经有域名的情况）
#
# 用法：
#   sudo cp deploy/nginx-order-system.conf /etc/nginx/sites-available/order-system
#   sudo nano /etc/nginx/sites-available/order-system   # 把 server_name 换成你自己的域名
#   sudo ln -s /etc/nginx/sites-available/order-system /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 如果没有域名、只用服务器 IP 访问，不要用这个独立站点文件，
# 直接把下面 location /order/ 和 location = /order 这两段加进
# /etc/nginx/sites-available/default 里已有的 server{} 块中即可，
# 详见 README.md 部署章节的说明（避免跟自带的 default_server 冲突）。

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;   # 改成你自己的域名，没有域名就别用这个文件

    location /order/ {
        proxy_pass http://127.0.0.1:3000;   # 注意：末尾不要加路径，让 /order 原样透传给后端
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 访问 /order（没有末尾斜杠）时跳转到 /order/，避免相对路径的静态资源加载失败
    location = /order {
        return 301 /order/;
    }

    # 根路径可选：跳转到点菜首页。不需要的话删掉这一段，访问 / 会是 404。
    location = / {
        return 301 /order/;
    }
}

# 以后配了 https，把上面 server 块的 listen 改成：
#     listen 443 ssl;
#     listen [::]:443 ssl;
#     ssl_certificate     /path/to/cert.pem;
#     ssl_certificate_key /path/to/key.pem;
# 前端会自动改用 wss:// 连接，不用改这个项目的代码。
# 另外通常还需要保留一个 80 端口的 server 块把 http 请求 301 到 https。
